<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMoney - AI 資產管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .pwa-card { border-radius: 2.5rem; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #94a3b8; font-weight: bold;">
            系統加載中，請稍候...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /**
         * 重要：請務必填寫以下資訊，否則功能會失效
         * 你可以從 Firebase Console -> 專案設定 -> 您的應用程式 中找到
         */
        const firebaseConfig = {
            apiKey: "你的_FIREBASE_API_KEY",
            authDomain: "你的_PROJECT.firebaseapp.com",
            projectId: "你的_PROJECT_ID",
            storageBucket: "你的_PROJECT.appspot.com",
            messagingSenderId: "你的_SENDER_ID",
            appId: "你的_APP_ID"
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        function App() {
            const [currentTab, setCurrentTab] = useState('home');
            const [fxRate, setFxRate] = useState(32.45);
            const [hideValues, setHideValues] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');
            const [isUpdating, setIsUpdating] = useState(false);
            
            // 這是你提供的 Gemini API Key
            const apiKey = "AIzaSyDV4ePstEkY2nZJqavAyzzYrHfI2cxSIp8";

            // 模擬一些預設資料（因為你目前可能還沒設好 Firebase）
            const [assets, setAssets] = useState([
                { id: 1, type: 'bank', name: '常用帳戶', balance: 50000, currency: 'TWD' },
                { id: 2, type: 'us_stock', name: 'NVIDIA', quantity: 10, lastPrice: 800, currency: 'USD' }
            ]);

            const handleSync = async () => {
                setIsUpdating(true);
                setSyncStatus('AI 更新中...');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "獲取目前 USD/TWD 匯率。回傳 JSON: {\"rate\": 數字}" }] }]
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text.match(/\{.*\}/s)[0]);
                    if (json.rate) setFxRate(json.rate);
                    setSyncStatus('同步完成');
                } catch (e) {
                    setSyncStatus('同步失敗');
                    console.error(e);
                }
                setTimeout(() => setSyncStatus(''), 2000);
                setIsUpdating(false);
            };

            const totals = useMemo(() => {
                let sum = 0;
                assets.forEach(a => {
                    const val = a.type === 'bank' ? a.balance : (a.lastPrice * a.quantity);
                    sum += val * (a.currency === 'USD' ? fxRate : 1);
                });
                return sum;
            }, [assets, fxRate]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    {/* Top Bar */}
                    <header className="p-6 flex justify-between items-center bg-white/70 backdrop-blur-md sticky top-0 z-10">
                        <h1 className="text-2xl font-black tracking-tighter">icash</h1>
                        <div className="flex gap-3">
                            <button onClick={() => setHideValues(!hideValues)} className="p-2 text-slate-400">
                                <Icon name={hideValues ? "EyeOff" : "Eye"} size={20} />
                            </button>
                            <button onClick={handleSync} className="p-2 text-slate-400 relative">
                                <Icon name="RefreshCw" size={20} className={isUpdating ? "animate-spin" : ""} />
                                {syncStatus && <span className="absolute -bottom-8 right-0 text-[10px] bg-black text-white px-2 py-1 rounded-full whitespace-nowrap">{syncStatus}</span>}
                            </button>
                        </div>
                    </header>

                    <main className="p-6 flex-1">
                        {/* 總覽卡片 */}
                        <section className="bg-slate-900 p-8 pwa-card text-white shadow-xl mb-8 relative overflow-hidden">
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Net Worth</p>
                            <h2 className="text-4xl font-black">
                                {hideValues ? "••••••" : `$${Math.round(totals).toLocaleString()}`}
                            </h2>
                            <div className="mt-6 inline-block bg-white/10 px-3 py-1 rounded-lg text-[10px] font-bold">
                                USD/TWD: {fxRate}
                            </div>
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-blue-500/20 rounded-full blur-3xl"></div>
                        </section>

                        {/* 分類清單 */}
                        <div className="grid grid-cols-2 gap-4">
                            {['tw_stock', 'us_stock', 'crypto', 'bank'].map(type => (
                                <div key={type} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                    <p className="text-slate-400 text-[10px] font-black uppercase mb-1">{type.replace('_', ' ')}</p>
                                    <p className="text-lg font-black">{hideValues ? "••••" : "Active"}</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 下選單 */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 flex justify-around items-center">
                        <button className="text-blue-600"><Icon name="LayoutDashboard" /></button>
                        <button className="text-slate-300"><Icon name="TrendingUp" /></button>
                        <button className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg -translate-y-4"><Icon name="Plus" /></button>
                        <button className="text-slate-300"><Icon name="Settings" /></button>
                        <button className="text-slate-300"><Icon name="User" /></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
