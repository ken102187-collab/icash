<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資產管理 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 overflow-x-hidden">

    <div id="app" class="min-h-screen pb-32">
        <!-- 頂部導航 -->
        <header class="glass border-b border-slate-100 px-6 py-6 sticky top-0 z-30">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <h1 id="view-title" class="text-xl font-black">總資產</h1>
                </div>
                <div class="flex gap-2">
                    <button id="privacy-btn" class="p-3 bg-slate-50 rounded-2xl text-slate-400">
                        <i data-lucide="eye" id="eye-icon"></i>
                    </button>
                    <button id="sync-btn" class="p-3 bg-slate-50 rounded-2xl text-slate-400 relative">
                        <i data-lucide="refresh-cw" id="refresh-icon"></i>
                        <span id="sync-badge" class="hidden absolute -bottom-1 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[8px] px-1.5 py-0.5 rounded-full font-bold">同步中</span>
                    </button>
                    <button id="open-modal-btn" class="p-3 bg-blue-600 rounded-2xl text-white shadow-lg">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto p-6" id="main-content">
            <!-- 總額卡片 -->
            <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden mb-6">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">估計資產淨值 (TWD)</p>
                <h2 id="total-amount" class="text-5xl font-black tracking-tighter truncate">$0</h2>
                <div class="mt-8 flex justify-between items-center relative z-10">
                    <button id="trends-btn" class="text-xs font-bold bg-white/10 px-4 py-2 rounded-xl flex items-center gap-2 active:scale-95">
                        <i data-lucide="trending-up" class="w-4 h-4"></i> 歷史走勢
                    </button>
                    <span id="fx-display" class="text-[10px] font-bold text-slate-500">USD/TWD: 32.50</span>
                </div>
                <div class="absolute top-[-30%] right-[-10%] w-64 h-64 bg-blue-600/20 rounded-full blur-[80px]"></div>
            </div>

            <!-- 分類網格 -->
            <div id="category-grid" class="grid grid-cols-2 gap-4">
                <!-- JS 動態渲染 -->
            </div>
        </main>

        <!-- 底部導航 -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass border-t border-slate-100 p-4 pb-8 safe-bottom flex justify-around z-40">
            <button data-tab="home" class="nav-item flex flex-col items-center gap-1 text-blue-600 font-bold">
                <i data-lucide="layout-dashboard"></i><span class="text-[10px]">總覽</span>
            </button>
            <button data-tab="tw_stock" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="trending-up"></i><span class="text-[10px]">台股</span>
            </button>
            <button data-tab="us_stock" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="globe"></i><span class="text-[10px]">美股</span>
            </button>
            <button data-tab="crypto" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="bitcoin"></i><span class="text-[10px]">幣圈</span>
            </button>
            <button data-tab="bank" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="landmark"></i><span class="text-[10px]">銀行</span>
            </button>
        </nav>
    </div>

    <!-- 新增 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm p-0 sm:p-6">
        <div class="w-full max-w-sm bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8">
            <h3 class="text-xl font-black mb-6 text-center">新增資產項目</h3>
            <div class="space-y-4">
                <select id="asset-type" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
                    <option value="tw_stock">台股</option>
                    <option value="us_stock">美股</option>
                    <option value="crypto">幣圈</option>
                    <option value="bank">銀行帳戶</option>
                </select>
                <input id="asset-name" placeholder="顯示名稱 (如: 台積電)" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
                <input id="asset-symbol" placeholder="標的代號 (如: 2330.TW)" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none uppercase">
                <input id="asset-qty" type="number" placeholder="持有數量 / 餘額" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
                
                <div class="pt-4 space-y-3">
                    <button id="confirm-add-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">確認新增</button>
                    <button id="close-modal-btn" class="w-full text-slate-300 font-bold text-sm py-2">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'asset-pwa-html-v1';
        const apiKey = ""; 

        let state = {
            user: null,
            assets: [],
            fxRate: 32.5,
            isPrivacy: false,
            currentTab: 'home',
            isUpdating: false
        };

        // 安全初始化 Lucide
        function safeRefreshIcons() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }

        // --- 初始化應用 ---
        window.addEventListener('load', () => {
            safeRefreshIcons();
            
            // Firebase Auth 狀態監聽
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.user = user;
                    initDataListeners();
                    setupPWAUpdate();
                } else {
                    signInAnonymously(auth).catch(err => console.error("匿名登入失敗:", err));
                }
            });

            // --- 綁定事件監聽器 ---
            document.getElementById('confirm-add-btn').addEventListener('click', submitAsset);
            document.getElementById('open-modal-btn').addEventListener('click', () => toggleModal(true));
            document.getElementById('close-modal-btn').addEventListener('click', () => toggleModal(false));
            document.getElementById('sync-btn').addEventListener('click', manualSync);
            document.getElementById('privacy-btn').addEventListener('click', togglePrivacy);
            
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.getAttribute('data-tab');
                    switchTab(tab);
                });
            });
        });

        function initDataListeners() {
            if (!state.user) return;
            const assetsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'assets');
            onSnapshot(assetsRef, (snapshot) => {
                state.assets = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
                checkAutoSync();
            }, (error) => console.error("Firestore 監聽錯誤:", error));
        }

        function setupPWAUpdate() {
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    checkAutoSync();
                }
            });
        }

        async function checkAutoSync() {
            if (state.isUpdating || state.assets.length === 0) return;
            const lastSync = state.assets[0]?.lastSync?.seconds * 1000 || 0;
            if (Date.now() - lastSync > (4 * 60 * 60 * 1000)) {
                await syncAllPrices();
            }
        }

        async function manualSync() {
            await syncAllPrices();
        }

        async function syncAllPrices() {
            if (state.isUpdating || !state.user) return;
            state.isUpdating = true;
            updateSyncUI(true);

            try {
                const fxRes = await callGemini("獲取目前 USD/TWD 匯率。回傳 JSON: {\"rate\": 數字}");
                if (fxRes?.rate) state.fxRate = fxRes.rate;

                let totalTWD = 0;
                for (const asset of state.assets) {
                    if (asset.type === 'bank') {
                        totalTWD += (asset.balance || 0);
                        continue;
                    }
                    const priceRes = await callGemini(`獲取 ${asset.symbol} 最新收盤價。回傳 JSON: {"price": 數字, "currency": "TWD"|"USD"}`);
                    if (priceRes?.price) {
                        const assetRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'assets', asset.id);
                        await updateDoc(assetRef, {
                            lastPrice: priceRes.price,
                            currency: priceRes.currency,
                            lastSync: serverTimestamp()
                        });
                        const rate = priceRes.currency === 'USD' ? state.fxRate : 1;
                        totalTWD += priceRes.price * (asset.quantity || 0) * rate;
                    }
                }
                const historyRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'history');
                await addDoc(historyRef, { total: totalTWD, timestamp: serverTimestamp() });
            } catch (e) {
                console.error("同步數據時發生錯誤:", e);
            } finally {
                state.isUpdating = false;
                updateSyncUI(false);
            }
        }

        async function callGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) return null;
                return JSON.parse(text.match(/\{.*\}/s)[0]);
            } catch (err) {
                console.error("API 請求錯誤:", err);
                return null;
            }
        }

        async function submitAsset() {
            if (!state.user) return;
            const nameEl = document.getElementById('asset-name');
            const typeEl = document.getElementById('asset-type');
            const symbolEl = document.getElementById('asset-symbol');
            const qtyEl = document.getElementById('asset-qty');

            const name = nameEl.value;
            const type = typeEl.value;
            const symbol = symbolEl.value;
            const qty = parseFloat(qtyEl.value || 0);

            if (!name) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'assets'), {
                    name, type, symbol,
                    quantity: type === 'bank' ? 0 : qty,
                    balance: type === 'bank' ? qty : 0,
                    lastPrice: 0,
                    lastSync: serverTimestamp(),
                    currency: (type === 'us_stock' || type === 'crypto') ? 'USD' : 'TWD'
                });
                
                nameEl.value = '';
                symbolEl.value = '';
                qtyEl.value = '';
                toggleModal(false);
            } catch (e) { 
                console.error("儲存資產錯誤:", e); 
            }
        }

        function render() {
            const categories = {
                tw_stock: { label: '台股', icon: 'trending-up', color: 'text-emerald-500', bg: 'bg-emerald-50' },
                us_stock: { label: '美股', icon: 'globe', color: 'text-blue-500', bg: 'bg-blue-50' },
                crypto: { label: '幣圈', icon: 'bitcoin', color: 'text-amber-500', bg: 'bg-amber-50' },
                bank: { label: '銀行', icon: 'landmark', color: 'text-slate-500', bg: 'bg-slate-50' }
            };

            const totals = { total: 0, tw_stock: 0, us_stock: 0, crypto: 0, bank: 0 };
            state.assets.forEach(a => {
                const val = a.type === 'bank' ? (a.balance || 0) : ((a.lastPrice || 0) * (a.quantity || 0));
                const rate = a.currency === 'USD' ? state.fxRate : 1;
                totals.total += (val * rate);
                totals[a.type] += (val * rate);
            });

            document.getElementById('total-amount').innerText = state.isPrivacy ? '••••••' : `$${Math.round(totals.total).toLocaleString()}`;
            document.getElementById('fx-display').innerText = `USD/TWD: ${state.fxRate.toFixed(2)}`;

            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            
            if (state.currentTab === 'home') {
                Object.entries(categories).forEach(([key, cfg]) => {
                    const card = document.createElement('button');
                    card.className = "bg-white border border-slate-100 p-6 rounded-[2rem] text-left active:scale-95 transition-all";
                    card.onclick = () => switchTab(key);
                    card.innerHTML = `
                        <div class="w-12 h-12 rounded-2xl ${cfg.bg} flex items-center justify-center mb-4"><i data-lucide="${cfg.icon}" class="${cfg.color}"></i></div>
                        <p class="text-slate-400 text-[10px] font-black uppercase mb-1">${cfg.label}</p>
                        <h3 class="font-black text-lg">${state.isPrivacy ? '••••' : '$' + Math.round(totals[key]).toLocaleString()}</h3>
                    `;
                    grid.appendChild(card);
                });
            } else {
                state.assets.filter(a => a.type === state.currentTab).forEach(a => {
                    const subtotal = a.type === 'bank' ? (a.balance || 0) : ((a.lastPrice || 0) * (a.quantity || 0));
                    const rate = a.currency === 'USD' ? state.fxRate : 1;
                    const item = document.createElement('div');
                    item.className = "col-span-2 bg-white rounded-[1.5rem] p-6 border border-slate-100 flex justify-between items-center";
                    item.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <h4 class="font-black text-slate-800">${a.name}</h4>
                                <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded uppercase">${a.symbol || 'CASH'}</span>
                            </div>
                            <p class="text-[11px] font-bold text-slate-400 mt-1">${a.type === 'bank' ? '餘額' : '數量'}: ${a.type === 'bank' ? a.balance : a.quantity}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-300 uppercase">現值(TWD)</p>
                            <p class="font-black text-lg text-slate-900">${state.isPrivacy ? '••••' : '$' + Math.round(subtotal * rate).toLocaleString()}</p>
                            <button id="del-${a.id}" class="text-slate-200 mt-1 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `;
                    grid.appendChild(item);
                    document.getElementById(`del-${a.id}`).addEventListener('click', () => deleteAsset(a.id));
                });
            }
            safeRefreshIcons();
        }

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => {
                const isActive = el.getAttribute('data-tab') === tab;
                el.classList.toggle('text-blue-600', isActive);
                el.classList.toggle('font-bold', isActive);
                el.classList.toggle('text-slate-300', !isActive);
            });
            render();
        }

        function togglePrivacy() { 
            state.isPrivacy = !state.isPrivacy;
            render(); 
        }

        function toggleModal(show) {
            document.getElementById('add-modal').classList.toggle('hidden', !show);
        }

        async function deleteAsset(id) {
            if (confirm("確定要刪除此資產嗎？")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'assets', id));
                } catch (err) { console.error("刪除失敗:", err); }
            }
        }

        function updateSyncUI(loading) {
            const icon = document.getElementById('refresh-icon');
            const badge = document.getElementById('sync-badge');
            if (loading) {
                icon.classList.add('animate-spin-slow');
                badge.classList.remove('hidden');
            } else {
                icon.classList.remove('animate-spin-slow');
                badge.classList.add('hidden');
            }
        }

        // 將 switchTab 暴露給 home 卡片使用
        window.switchTab = switchTab;
    </script>
</body>
</html>
