<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>icash 資產管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0"></script>
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: sans-serif; }
        #error-display { color: red; padding: 20px; font-family: monospace; display: none; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    
    <div id="root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #64748b;">
            <div id="loading-spinner" style="border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animate: spin 1s linear infinite;"></div>
            <p style="margin-top: 15px; font-weight: bold;">icash 啟動中...</p>
        </div>
    </div>

    <script type="text/babel">
        // 錯誤監聽：防止空白頁
        window.onerror = function(msg, url, line) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `運行出錯: ${msg} <br/> 行號: ${line}`;
            return false;
        };

        const { useState, useMemo } = React;

        function App() {
            const [fxRate, setFxRate] = useState(32.45);
            const [syncStatus, setSyncStatus] = useState('');
            const apiKey = "AIzaSyDV4ePstEkY2nZJqavAyzzYrHfI2cxSIp8";

            const handleSync = async () => {
                setSyncStatus('更新匯率中...');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "USD/TWD rate? Return JSON: {\"rate\": number}" }] }]
                        })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text.match(/\{.*\}/s)[0]);
                    if (json.rate) setFxRate(json.rate);
                    setSyncStatus('更新成功');
                } catch (e) {
                    setSyncStatus('API 錯誤');
                }
                setTimeout(() => setSyncStatus(''), 2000);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col p-6">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-black text-slate-900">icash</h1>
                        <button onClick={handleSync} className="bg-white p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-500 relative">
                            更新匯率 {syncStatus && <span className="absolute -bottom-8 right-0 text-xs text-blue-500 font-bold">{syncStatus}</span>}
                        </button>
                    </header>

                    <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-6">
                        <p className="text-slate-400 text-xs font-bold uppercase mb-2">我的總資產 (TWD)</p>
                        <h2 className="text-4xl font-black mb-4">$0</h2>
                        <div className="text-[10px] bg-white/10 inline-block px-3 py-1 rounded-full text-slate-300">
                            目前匯率: {fxRate}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        {['台股', '美股', '加密貨幣', '銀行'].map(cat => (
                            <div key={cat} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                <p className="text-slate-400 text-[10px] font-black mb-1">{cat}</p>
                                <p className="text-lg font-bold text-slate-300">未設定</p>
                            </div>
                        ))}
                    </div>

                    <div className="mt-10 p-6 bg-blue-50 rounded-3xl border border-blue-100">
                        <p className="text-blue-800 text-sm font-bold">💡 提示</p>
                        <p className="text-blue-600 text-xs mt-1">請填寫 Firebase Config 以啟用儲存功能。</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
