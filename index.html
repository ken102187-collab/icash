<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>資產管理 Pro</title>
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="資產管理">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            margin: 0;
            background-color: #f8fafc;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input, select { -webkit-user-select: text; user-select: text; }

        #error-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        canvas { width: 100% !important; height: 180px !important; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <div id="error-overlay">
        <div class="bg-red-50 text-red-500 p-8 rounded-[2.5rem] mb-6">
            <i data-lucide="shield-alert" class="w-16 h-16 mx-auto mb-4"></i>
            <h2 class="font-black text-xl">系統初始化失敗</h2>
            <p id="error-message" class="text-sm opacity-80 mt-2">環境配置尚未就緒</p>
        </div>
        <button onclick="window.location.reload()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black shadow-xl">重新連接</button>
    </div>

    <div id="app" class="min-h-screen pb-32">
        <header class="glass border-b border-slate-100 px-6 py-4 sticky top-0 z-30">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <h1 id="view-title" class="text-xl font-black text-slate-800">我的資產</h1>
                <div class="flex gap-2">
                    <button id="privacy-btn" class="p-3 bg-slate-50 rounded-2xl text-slate-400 active:bg-slate-100">
                        <i data-lucide="eye" id="eye-icon"></i>
                    </button>
                    <button id="sync-btn" class="p-3 bg-slate-50 rounded-2xl text-slate-400 relative">
                        <i data-lucide="refresh-cw" id="refresh-icon"></i>
                        <span id="sync-badge" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-blue-600 rounded-full border-2 border-white"></span>
                    </button>
                    <button id="open-modal-btn" class="p-3 bg-blue-600 rounded-2xl text-white shadow-lg active:scale-95 transition-transform">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto p-6">
            <!-- 總額卡片 -->
            <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden mb-6">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">資產淨值估算 (TWD)</p>
                <h2 id="total-amount" class="text-4xl font-black tracking-tighter truncate">$0</h2>
                <div class="mt-4 flex justify-between items-center relative z-10">
                    <div id="fx-display" class="text-[10px] font-bold text-slate-400">USD/TWD: 32.50</div>
                </div>
                <div class="absolute top-[-30%] right-[-10%] w-64 h-64 bg-blue-600/20 rounded-full blur-[80px]"></div>
            </div>

            <!-- 趨勢圖卡片 -->
            <div id="trend-section" class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 text-sm flex items-center gap-2">
                        <i data-lucide="line-chart" class="w-4 h-4 text-blue-500"></i> 資產趨勢
                    </h3>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">最近 7 筆紀錄</span>
                </div>
                <div class="relative h-[180px]">
                    <canvas id="assetChart"></canvas>
                </div>
            </div>

            <div id="category-grid" class="grid grid-cols-1 gap-4">
                <!-- 動態載入 -->
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-100 p-4 pb-8 safe-bottom flex justify-around z-40">
            <button data-tab="home" class="nav-item flex flex-col items-center gap-1 text-blue-600 font-bold">
                <i data-lucide="layout-grid"></i><span class="text-[10px]">概覽</span>
            </button>
            <button data-tab="stock" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="trending-up"></i><span class="text-[10px]">證券</span>
            </button>
            <button data-tab="bank" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="landmark"></i><span class="text-[10px]">銀行</span>
            </button>
        </nav>
    </div>

    <!-- 新增資產 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-0 sm:p-6">
        <div class="w-full max-w-sm bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-6 text-center text-slate-800">新增資產</h3>
            <div class="space-y-4">
                <select id="asset-type" class="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all">
                    <option value="tw_stock">台股 (TWD)</option>
                    <option value="us_stock">美股 (USD)</option>
                    <option value="crypto">加密貨幣 (USD)</option>
                    <option value="bank">銀行帳戶 (TWD)</option>
                </select>
                
                <div id="field-name-container">
                    <input id="asset-name" placeholder="項目名稱 (如：台積電)" class="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none">
                </div>

                <div id="field-symbol-container">
                    <input id="asset-symbol" placeholder="標的代號 (如：2330.TW)" class="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none uppercase">
                </div>

                <div id="field-qty-container">
                    <input id="asset-qty" type="number" inputmode="decimal" placeholder="持有數量" class="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none">
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button id="close-modal-btn" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black">取消</button>
                    <button id="confirm-add-btn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">儲存資產</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        function initSystem() {
            try {
                if (typeof __firebase_config === 'undefined' || !__firebase_config) throw new Error("Config missing");
                return JSON.parse(__firebase_config);
            } catch (e) {
                document.getElementById('error-overlay').style.display = 'flex';
                return null;
            }
        }

        const config = initSystem();
        if (!config) throw new Error("Stop");

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'asset-pro-pwa';
        const apiKey = ""; 

        let state = {
            user: null,
            assets: [],
            history: [],
            fxRate: 32.5,
            isPrivacy: false,
            currentTab: 'home',
            isUpdating: false,
            chart: null
        };

        window.onload = async () => {
            if (window.lucide) lucide.createIcons();
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.user = user;
                    startListening();
                }
            });

            // 初始化 Modal 欄位監聽
            const typeSelect = document.getElementById('asset-type');
            typeSelect.onchange = handleTypeChange;

            document.getElementById('open-modal-btn').onclick = () => toggleModal(true);
            document.getElementById('close-modal-btn').onclick = () => toggleModal(false);
            document.getElementById('confirm-add-btn').onclick = submitAsset;
            document.getElementById('privacy-btn').onclick = () => { state.isPrivacy = !state.isPrivacy; render(); };
            document.getElementById('sync-btn').onclick = syncPrices;
            
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.onclick = () => {
                    state.currentTab = btn.dataset.tab;
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-blue-600', 'text-slate-300'));
                    btn.classList.replace('text-slate-300', 'text-blue-600');
                    document.getElementById('trend-section').classList.toggle('hidden', state.currentTab !== 'home');
                    render();
                }
            });
        };

        function handleTypeChange() {
            const type = document.getElementById('asset-type').value;
            const symbolField = document.getElementById('field-symbol-container');
            const qtyInput = document.getElementById('asset-qty');
            const nameInput = document.getElementById('asset-name');

            if (type === 'bank') {
                symbolField.classList.add('hidden');
                nameInput.placeholder = "銀行名稱 (如：玉山銀行)";
                qtyInput.placeholder = "帳戶餘額 (TWD)";
            } else {
                symbolField.classList.remove('hidden');
                nameInput.placeholder = "項目名稱 (如：台積電)";
                qtyInput.placeholder = "持有數量";
            }
        }

        function startListening() {
            onSnapshot(collection(db, 'artifacts', appId, 'users', state.user.uid, 'assets'), (snap) => {
                state.assets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'users', state.user.uid, 'history'), (snap) => {
                state.history = snap.docs.map(d => d.data()).sort((a, b) => new Date(a.date) - new Date(b.date));
                updateChart();
            });
        }

        async function syncPrices() {
            if (state.isUpdating) return;
            state.isUpdating = true;
            document.getElementById('refresh-icon').classList.add('animate-spin-slow');
            document.getElementById('sync-badge').classList.remove('hidden');

            try {
                const prompt = `獲取目前 USD/TWD 匯率，並獲取以下代號的最新價格：${state.assets.filter(a => a.type !== 'bank').map(a => a.symbol).join(',')}. 回傳 JSON: {"rate": 32.5, "prices": {"代號": 價格}}`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await res.json();
                const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");

                if (result.rate) state.fxRate = result.rate;
                
                let totalTWD = 0;
                for (const asset of state.assets) {
                    let currentVal = 0;
                    if (asset.type === 'bank') {
                        currentVal = asset.balance;
                    } else {
                        const price = result.prices?.[asset.symbol.toUpperCase()] || result.prices?.[asset.symbol] || asset.lastPrice;
                        const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'assets', asset.id);
                        await updateDoc(ref, { lastPrice: price, lastSync: serverTimestamp() });
                        currentVal = price * asset.quantity;
                    }
                    totalTWD += (currentVal * (asset.currency === 'USD' ? state.fxRate : 1));
                }

                const today = new Date().toISOString().split('T')[0];
                await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'history', today), {
                    date: today,
                    total: totalTWD
                });

            } catch (e) { console.error(e); } finally {
                state.isUpdating = false;
                document.getElementById('refresh-icon').classList.remove('animate-spin-slow');
                document.getElementById('sync-badge').classList.add('hidden');
                render();
            }
        }

        function updateChart() {
            const canvas = document.getElementById('assetChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = state.history.slice(-7); 
            
            if (state.chart) state.chart.destroy();

            state.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date.split('-').slice(1).join('/')),
                    datasets: [{
                        label: '總資產',
                        data: data.map(d => d.total),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } }
                    }
                }
            });
        }

        function render() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            let totalTWD = 0;
            state.assets.forEach(a => {
                const val = a.type === 'bank' ? a.balance : (a.lastPrice * a.quantity);
                const rate = a.currency === 'USD' ? state.fxRate : 1;
                totalTWD += (val * rate);
            });

            document.getElementById('total-amount').innerText = state.isPrivacy ? '••••••' : `$${Math.round(totalTWD).toLocaleString()}`;
            document.getElementById('fx-display').innerText = `USD/TWD: ${state.fxRate.toFixed(2)}`;

            const filtered = state.currentTab === 'home' ? state.assets : state.assets.filter(a => a.type.includes(state.currentTab));

            filtered.forEach(a => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[1.5rem] border border-slate-100 flex justify-between items-center shadow-sm";
                const subtotal = a.type === 'bank' ? a.balance : (a.lastPrice * a.quantity);
                const rate = a.currency === 'USD' ? state.fxRate : 1;
                
                card.innerHTML = `
                    <div>
                        <h4 class="font-black text-slate-800">${a.name}</h4>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5">${a.symbol || 'CASH'} • ${a.type === 'bank' ? '餘額' : '數量'}: ${a.type === 'bank' ? a.balance : a.quantity}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-lg text-slate-900">${state.isPrivacy ? '••••' : '$' + Math.round(subtotal * rate).toLocaleString()}</p>
                        <button onclick="window.deleteItem('${a.id}')" class="text-slate-200 mt-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
            if (window.lucide) lucide.createIcons();
        }

        async function submitAsset() {
            const name = document.getElementById('asset-name').value;
            const type = document.getElementById('asset-type').value;
            const symbol = document.getElementById('asset-symbol').value;
            const qty = parseFloat(document.getElementById('asset-qty').value || 0);
            if (!name) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'assets'), {
                    name, type, symbol: type === 'bank' ? '' : symbol,
                    quantity: type === 'bank' ? 0 : qty,
                    balance: type === 'bank' ? qty : 0,
                    lastPrice: 0,
                    lastSync: serverTimestamp(),
                    currency: (type === 'tw_stock' || type === 'bank') ? 'TWD' : 'USD'
                });
                toggleModal(false);
                document.querySelectorAll('#add-modal input').forEach(i => i.value = '');
            } catch (e) { console.error(e); }
        }

        window.deleteItem = async (id) => {
            if (confirm("確定刪除此資產？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'assets', id));
            }
        };

        function toggleModal(show) { 
            document.getElementById('add-modal').classList.toggle('hidden', !show); 
            if (show) handleTypeChange(); // 重設欄位狀態
        }
    </script>
</body>
</html>
